<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
<defs>
<linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF3E6"/><stop offset="1" stop-color="#F8D9C4"/></linearGradient>
<linearGradient id="tag" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF8C72"/><stop offset="1" stop-color="#E5664A"/></linearGradient>
</defs>
<style>.sw{transform-origin:150px 70px;animation:swg 4s ease-in-out infinite}@keyframes swg{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.spk{animation:sk 2.4s ease-in-out infinite}@keyframes sk{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}</style>
<rect width="400" height="250" fill="url(#bg3)"/>
<g class="sw">
<line x1="150" y1="40" x2="150" y2="78" stroke="#C9A961" stroke-width="5" stroke-linecap="round"/>
<rect x="120" y="74" width="150" height="104" rx="18" transform="rotate(18 150 90)" fill="url(#tag)"/>
<circle cx="150" cy="96" r="11" transform="rotate(18 150 90)" fill="#FDF4E8"/>
<text x="210" y="150" text-anchor="middle" transform="rotate(18 150 90)" font-family="Inter,Arial,sans-serif" font-size="56" font-weight="800" fill="#fff">$</text>
</g>
<g><circle cx="262" cy="180" r="26" fill="#6B7D5A"/><path d="M250 180 l8 9 16 -19" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></g>
<g class="spk" style="transform-origin:312px 70px"><path d="M312 52 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4z" fill="#C9A961"/></g>
<g class="spk" style="transform-origin:96px 150px;animation-delay:.8s"><path d="M96 138 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3z" fill="#E5664A"/></g>
</svg>
