<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF3E6"/><stop offset="1" stop-color="#FBE0CF"/></linearGradient>
<linearGradient id="ring" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF8C72"/><stop offset="1" stop-color="#E5664A"/></linearGradient>
<radialGradient id="glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FF8C72" stop-opacity="0.5"/><stop offset="1" stop-color="#FF8C72" stop-opacity="0"/></radialGradient>
</defs>
<style>
.pulse{transform-origin:200px 120px;animation:pl 3s ease-in-out infinite}
@keyframes pl{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
.sec{transform-origin:200px 120px;animation:sp 6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.badge{transform-origin:center;animation:bb 3s ease-in-out infinite}
@keyframes bb{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
</style>
<rect width="400" height="250" fill="url(#bg)"/>
<circle class="pulse" cx="200" cy="120" r="92" fill="url(#glow)"/>
<circle cx="200" cy="120" r="70" fill="#FDF4E8" stroke="url(#ring)" stroke-width="9"/>
<g stroke="#C9A961" stroke-width="3" stroke-linecap="round">
<line x1="200" y1="60" x2="200" y2="70"/><line x1="200" y1="170" x2="200" y2="180"/>
<line x1="140" y1="120" x2="150" y2="120"/><line x1="250" y1="120" x2="260" y2="120"/>
</g>
<line x1="200" y1="120" x2="200" y2="80" stroke="#2A1F1A" stroke-width="5" stroke-linecap="round"/>
<line x1="200" y1="120" x2="234" y2="138" stroke="#2A1F1A" stroke-width="5" stroke-linecap="round"/>
<g class="sec"><line x1="200" y1="120" x2="200" y2="70" stroke="#E5664A" stroke-width="2.5" stroke-linecap="round"/></g>
<circle cx="200" cy="120" r="6" fill="#E5664A"/>
<g class="badge"><rect x="160" y="196" width="80" height="34" rx="17" fill="url(#ring)"/>
<text x="200" y="219" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#fff">24/7</text></g>
</svg>
