<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
<defs>
<linearGradient id="cb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E8F4FB"/><stop offset="1" stop-color="#CDE6F5"/></linearGradient>
<linearGradient id="acu" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#E2E8F0"/></linearGradient>
</defs>
<style>.wave{animation:wv 2.6s ease-in-out infinite}@keyframes wv{0%{opacity:0;transform:translateY(0)}30%{opacity:.7}100%{opacity:0;transform:translateY(34px)}}
.flake{transform-origin:center;animation:rot 9s linear infinite}@keyframes rot{to{transform:rotate(360deg)}}</style>
<rect width="400" height="250" fill="url(#cb)"/>
<rect x="96" y="58" width="208" height="64" rx="18" fill="url(#acu)" stroke="#BcdAEA" stroke-width="2"/>
<rect x="108" y="104" width="184" height="10" rx="5" fill="#BFDBFE"/>
<g stroke="#60A5FA" stroke-width="2" opacity=".5"><line x1="120" y1="74" x2="280" y2="74"/><line x1="120" y1="86" x2="280" y2="86"/></g>
<g stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity=".55">
<path class="wave" d="M140 128 q8 14 0 26"/><path class="wave" d="M200 128 q8 16 0 30" style="animation-delay:.5s"/><path class="wave" d="M260 128 q8 14 0 26" style="animation-delay:1s"/></g>
<g class="flake" style="transform-origin:330px 70px"><g stroke="#3B82F6" stroke-width="3" stroke-linecap="round"><line x1="330" y1="52" x2="330" y2="88"/><line x1="314" y1="61" x2="346" y2="79"/><line x1="346" y1="61" x2="314" y2="79"/></g></g>
<g class="flake" style="transform-origin:64px 180px"><g stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round"><line x1="64" y1="166" x2="64" y2="194"/><line x1="52" y1="173" x2="76" y2="187"/><line x1="76" y1="173" x2="52" y2="187"/></g></g>
</svg>
