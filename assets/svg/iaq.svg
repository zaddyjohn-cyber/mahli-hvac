<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
<defs>
<linearGradient id="ib" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF7EE"/><stop offset="1" stop-color="#D9EBDA"/></linearGradient>
<linearGradient id="pu" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#DCE7DF"/></linearGradient>
</defs>
<style>.flow{stroke-dasharray:8 10;animation:fl 3s linear infinite}@keyframes fl{to{stroke-dashoffset:-36}}
.mol{animation:mv 4s ease-in-out infinite}@keyframes mv{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-10px);opacity:1}}</style>
<rect width="400" height="250" fill="url(#ib)"/>
<rect x="150" y="60" width="100" height="140" rx="20" fill="url(#pu)" stroke="#A6B493" stroke-width="2"/>
<circle cx="200" cy="100" r="22" fill="none" stroke="#6B7D5A" stroke-width="4"/>
<circle cx="200" cy="100" r="9" fill="#8A9A7B"/>
<g stroke="#A6B493" stroke-width="4" stroke-linecap="round"><line x1="180" y1="140" x2="220" y2="140"/><line x1="180" y1="154" x2="220" y2="154"/><line x1="180" y1="168" x2="220" y2="168"/></g>
<g stroke="#6B7D5A" stroke-width="3" fill="none" opacity=".6"><path class="flow" d="M60 90 q40 -16 80 0"/><path class="flow" d="M60 130 q40 -16 80 0" style="animation-delay:.6s"/><path class="flow" d="M260 90 q40 -16 80 0"/><path class="flow" d="M260 130 q40 -16 80 0" style="animation-delay:.6s"/></g>
<g fill="#8A9A7B"><circle class="mol" cx="96" cy="180" r="6"/><circle class="mol" cx="312" cy="178" r="7" style="animation-delay:1s"/><circle class="mol" cx="120" cy="68" r="5" style="animation-delay:1.6s"/><circle class="mol" cx="300" cy="60" r="6" style="animation-delay:.4s"/></g>
</svg>
